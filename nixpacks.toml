[phases.setup]
# Node.js version is auto-detected from "engines" in package.json
# Only add C++ build tools needed to compile better-sqlite3 from source
nixPkgs = ["python3", "gcc", "gnumake"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "next start -p ${PORT:-3000}"
